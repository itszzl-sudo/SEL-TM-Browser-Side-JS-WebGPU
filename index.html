        animAlpha = 1;
      }

      const centerX = task.x + task.w / 2;
      const centerY = task.y + task.h / 2;
      const scaledW = task.w * animScale;
      const scaledH = task.h * animScale;

      const x1 = ((centerX - scaledW/2) / w) * 2 - 1;
      const y1 = 1 - ((centerY - scaledH/2) / h) * 2;
      const x2 = ((centerX + scaledW/2) / w) * 2 - 1;
      const y2 = 1 - ((centerY + scaledH/2) / h) * 2;

      // 颜色与渐变数据
      const baseColor = [...task.color];
      baseColor[3] = animAlpha;
      const gradStart = task.gradient?.start || baseColor;
      const gradEnd = task.gradient?.end || baseColor;

      // UV坐标用于渐变插值
      const uv00 = [0,0], uv01 = [0,1], uv11 = [1,1];
      const uv10 = [1,0], uv112 = [1,1], uv002 = [0,0];

      // 6个顶点数据：位置+基础色+渐变起始色+渐变结束色+UV+矩形边界+圆角半径
      const rectMinX = ((task.x) / w) * 2 - 1;
      const rectMinY = 1 - ((task.y) / h) * 2;
      const rectMaxX = ((task.x + task.w) / w) * 2 - 1;
      const rectMaxY = 1 - ((task.y + task.h) / h) * 2;
      const rect = [rectMinX, rectMinY, rectMaxX, rectMaxY];
      const radius = task.radius / w * 2; // 归一化到[-1,1]范围

      vertices.push(
        x1,y1, ...baseColor, ...gradStart, ...gradEnd, ...uv00, ...rect, radius,
        x1,y2, ...baseColor, ...gradStart, ...gradEnd, ...uv01, ...rect, radius,
        x2,y2, ...baseColor, ...gradStart, ...gradEnd, ...uv11, ...rect, radius,
        x1,y1, ...baseColor, ...gradStart, ...gradEnd, ...uv10, ...rect, radius,
        x2,y2, ...baseColor, ...gradStart, ...gradEnd, ...uv112, ...rect, radius,
        x2,y1, ...baseColor, ...gradStart, ...gradEnd, ...uv002, ...rect, radius
      );
    });
    return new Float32Array(vertices);
  }

  // 生成阴影顶点数据
  generateShadowVertexData(tasks) {
    const vertices = [];
    const w = this.canvas.width;
    const h = this.canvas.height;

    tasks.forEach((task, idx) => {
      const shadow = task.shadow || { x: 0, y: 4, blur: 8, color: [0, 0, 0, 0.3] };
      
      const centerX = task.x + task.w / 2 + shadow.x;
      const centerY = task.y + task.h / 2 + shadow.y;
      const scaledW = task.w + shadow.blur * 2;
      const scaledH = task.h + shadow.blur * 2;

      const x1 = ((centerX - scaledW/2) / w) * 2 - 1;
      const y1 = 1 - ((centerY - scaledH/2) / h) * 2;
      const x2 = ((centerX + scaledW/2) / w) * 2 - 1;
      const y2 = 1 - ((centerY + scaledH/2) / h) * 2;

      const baseColor = [shadow.color[0], shadow.color[1], shadow.color[2], shadow.color[3] * 0.5];
      const gradStart = baseColor;
      const gradEnd = [...baseColor];
      gradEnd[3] = 0;

      const uv00 = [0,0], uv01 = [0,1], uv11 = [1,1];
      const uv10 = [1,0], uv112 = [1,1], uv002 = [0,0];

      const rectMinX = ((task.x + shadow.x - shadow.blur) / w) * 2 - 1;
      const rectMinY = 1 - ((task.y + shadow.y - shadow.blur) / h) * 2;
      const rectMaxX = ((task.x + task.w + shadow.x + shadow.blur) / w) * 2 - 1;
      const rectMaxY = 1 - ((task.y + task.h + shadow.y + shadow.blur) / h) * 2;
      const rect = [rectMinX, rectMinY, rectMaxX, rectMaxY];
      const radius = (task.radius || 8) / w * 2;

      vertices.push(
        x1,y1, ...baseColor, ...gradStart, ...gradEnd, ...uv00, ...rect, radius,
        x1,y2, ...baseColor, ...gradStart, ...gradEnd, ...uv01, ...rect, radius,
        x2,y2, ...baseColor, ...gradStart, ...gradEnd, ...uv11, ...rect, radius,
        x1,y1, ...baseColor, ...gradStart, ...gradEnd, ...uv10, ...rect, radius,
        x2,y2, ...baseColor, ...gradStart, ...gradEnd, ...uv112, ...rect, radius,
        x2,y1, ...baseColor, ...gradStart, ...gradEnd, ...uv002, ...rect, radius
      );
    });
    return new Float32Array(vertices);
  }

  // FPS 统计 & 动画时间更新
  updateFpsAndAnimation() {
    SEL_TM.frameCount++;
    SEL_TM.animationTime += 0.016;
    const now = performance.now();
    if (now - SEL_TM.lastFpsTime >= 1000) {
      document.getElementById('fps-count').innerText = `${SEL_TM.frameCount} FPS`;
      SEL_TM.frameCount = 0;
      SEL_TM.lastFpsTime = now;
    }
  }

  renderLoop() {
    requestAnimationFrame(() => this.renderLoop());
    this.updateFpsAndAnimation();
    const layoutTasks = SEL_TM.currentLayoutTasks;
    const textTasks = SEL_TM.currentTextTasks;
    if (layoutTasks.length === 0) return;

    const encoder = this.device.createCommandEncoder();
    const texture = this.context.getCurrentTexture().createView();

    const pass = encoder.beginRenderPass({
      colorAttachments: [{
        view: texture,
        loadOp: 'clear',
        clearValue: [0.05, 0.05, 0.08, 1],
        storeOp: 'store'
      }]
    });

    // 先渲染阴影
    const shadowData = this.generateShadowVertexData(layoutTasks);
    const shadowBuf = this.device.createBuffer({
      size: shadowData.byteLength,
      usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST
    });
    this.device.queue.writeBuffer(shadowBuf, 0, shadowData);
    pass.setPipeline(this.layoutPipeline);
    pass.setVertexBuffer(0, shadowBuf);
    pass.draw(layoutTasks.length * 6);

    // 渲染高阶布局色块（渐变+动画+hover）
    const layoutData = this.generateAdvancedVertexData(layoutTasks);
    const layoutBuf = this.device.createBuffer({
      size: layoutData.byteLength,
      usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST
    });
    this.device.queue.writeBuffer(layoutBuf, 0, layoutData);

    pass.setPipeline(this.layoutPipeline);
    pass.setVertexBuffer(0, layoutBuf);
    pass.draw(layoutTasks.length * 6);

    // 渲染文本
    textTasks.forEach(task => {
      if (!task.text) return;
      const { texture, vertices } = this.textToTexture(
        task.text, task.x, task.y, task.w, task.h, task.fontSize
      );
      const textBuf = this.device.createBuffer({
        size: vertices.byteLength,
        usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST
      });
      this.device.queue.writeBuffer(textBuf, 0, vertices);

      const bindGroup = this.device.createBindGroup({
        layout: this.textPipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: texture.createView() },
          { binding: 1, resource: this.sampler }
        ]
      });

      pass.setPipeline(this.textPipeline);
      pass.setVertexBuffer(0, textBuf);
      pass.setBindGroup(0, bindGroup);
      pass.draw(6);
    });

    pass.end();
    this.device.queue.submit([encoder.finish()]);
  }
}

// 滚动支持函数
function initScrollSupport(gpuPath) {
  let scrollX = 0;
  let scrollY = 0;
  
  // 鼠标滚轮事件 - 使用 non-passive 模式
  document.addEventListener('wheel', (e) => {
    scrollY += e.deltaY * 0.5;
    scrollX += e.deltaX * 0.5;
    
    // 限制滚动范围
    scrollY = Math.max(0, Math.min(scrollY, 1000));
    scrollX = Math.max(0, Math.min(scrollX, 500));
    
    // 更新滚动位置到全局状态
    SEL_TM.scrollOffset = { x: scrollX, y: scrollY };
    document.getElementById('scroll-offset').innerText = `(${Math.round(scrollX)}, ${Math.round(scrollY)})`;
  }, { passive: true });
  
  // 触摸滚动支持
  let touchStartY = 0;
  document.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  
  document.addEventListener('touchmove', (e) => {
    const deltaY = touchStartY - e.touches[0].clientY;
    scrollY += deltaY;
    scrollY = Math.max(0, Math.min(scrollY, 1000));
    SEL_TM.scrollOffset = { x: scrollX, y: scrollY };
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
}

// ==============================================
// 组4: 交互系统 - click/input/keydown事件
// ==============================================

// 交互事件管理器
class InteractionManager {
  constructor() {
    this.clickHandlers = new Map();    // index -> callback
    this.hoverHandlers = new Map();    // index -> callback
    this.keydownHandlers = [];         // 全局键盘事件
    this.focusedElement = null;        // 当前聚焦元素
    this.inputValues = new Map();      // 输入框值存储 index -> value
    this.eventLog = [];                // 事件日志
  }

  // 注册点击事件
  onClick(index, callback) {
    this.clickHandlers.set(index, callback);
  }

  // 注册悬停事件
  onHover(index, callback) {
    this.hoverHandlers.set(index, callback);
  }

  // 注册键盘事件
  onKeydown(callback) {
    this.keydownHandlers.push(callback);
  }

  // 触发点击事件
  triggerClick(index, event) {
    const handler = this.clickHandlers.get(index);
    if (handler) {
      handler(event);
      this.logEvent('click', index, event);
    }
  }

  // 触发悬停事件
  triggerHover(index, isHovering) {
    const handler = this.hoverHandlers.get(index);
    if (handler) {
      handler(isHovering);
      this.logEvent(isHovering ? 'hover' : 'hoverEnd', index);
    }
  }

  // 触发键盘事件
  triggerKeydown(event) {
    this.keydownHandlers.forEach(handler => handler(event));
    this.logEvent('keydown', null, event);
  }

  // 记录事件日志
  logEvent(type, index, data) {
    const entry = {
      type,
      index,
      time: new Date().toLocaleTimeString(),
      data: data ? (data.key || data.clientX) : null
    };
    this.eventLog.unshift(entry);
    if (this.eventLog.length > 10) this.eventLog.pop();

    // 更新调试面板
    const eventInfo = document.getElementById('event-log');
    if (eventInfo) {
      eventInfo.innerText = this.eventLog.slice(0, 3).map(e => 
        `${e.time} ${e.type}${e.index !== null ? ` #${e.index}` : ''}`
      ).join('\n');
    }
  }

  // 检查点是否在元素内
  isPointInRect(x, y, rect) {
    return x >= rect.x && x <= rect.x + rect.w &&
           y >= rect.y && y <= rect.y + rect.h;
  }

  // 处理鼠标点击
  handleClick(x, y, tasks) {
    // 逆序检查（z-index 大的先检查）
    for (let i = tasks.length - 1; i >= 0; i--) {
      const task = tasks[i];
      if (this.isPointInRect(x, y, task)) {
        this.triggerClick(i, { clientX: x, clientY: y, target: task });
        return i;
      }
    }
    return -1;
  }

  // 处理鼠标移动（悬停检测）
  handleMouseMove(x, y, tasks) {
    let hoveredIndex = -1;
    for (let i = tasks.length - 1; i >= 0; i--) {
      const task = tasks[i];
      if (this.isPointInRect(x, y, task)) {
        hoveredIndex = i;
        break;
      }
    }
    return hoveredIndex;
  }

  // 获取输入值
  getInputValue(index) {
    return this.inputValues.get(index) || '';
  }

  // 设置输入值
  setInputValue(index, value) {
    this.inputValues.set(index, value);
  }
}

// 初始化交互管理器
const interactionManager = new InteractionManager();

// 注册点击事件示例
interactionManager.onClick(0, (e) => {
  console.log('点击了元素 0', e);
});

// 注册键盘事件
interactionManager.onKeydown((e) => {
  console.log('按键:', e.key);
});

// 鼠标点击处理器
function handleClick(x, y) {
  const tasks = SEL_TM.currentLayoutTasks || [];
  const clickedIndex = interactionManager.handleClick(x, y, tasks);
  if (clickedIndex >= 0) {
    console.log(`点击了元素 #${clickedIndex}`);
  }
}

// 鼠标移动处理器（悬停效果）
let lastHoverIndex = -1;
function handleMouseMove(x, y) {
  const tasks = SEL_TM.currentLayoutTasks || [];
  const hoverIndex = interactionManager.handleMouseMove(x, y, tasks);
  
  if (hoverIndex !== lastHoverIndex) {
    if (lastHoverIndex >= 0) {
      interactionManager.triggerHover(lastHoverIndex, false);
    }
    if (hoverIndex >= 0) {
      interactionManager.triggerHover(hoverIndex, true);
    }
    lastHoverIndex = hoverIndex;
  }
}

async function switchPage(pageName) {

async function bootstrap() {
  const canvas = document.getElementById('sel-tm-canvas');

  const coldPath = new SELColdPath();
  await coldPath.init();

  const gpuPath = new SELWebGPU(canvas);
  await gpuPath.init();

  const html = await coldPath.loadExternalHTML(currentPage + '.html');
  await coldPath.parseHTML(html);

  gpuPath.renderLoop();
  initController(coldPath, gpuPath);

  // 页面切换 Switch 事件监听
  const pageToggle = document.getElementById('page-toggle');
  const pageLabel = document.getElementById('page-label');
  pageToggle.addEventListener('change', async (e) => {
    currentPage = e.target.checked ? 'test-all' : 'demo';
    pageLabel.innerText = currentPage;

    // 重新初始化并渲染
    const newColdPath = new SELColdPath();
    await newColdPath.init();
    gpuPath.charCanvas = document.createElement('canvas');
    gpuPath.charCtx = gpuPath.charCanvas.getContext('2d');
    const newHtml = await newColdPath.loadExternalHTML(currentPage + '.html');
    await newColdPath.parseHTML(newHtml);
    initController(newColdPath, gpuPath);
    console.log(`🔄 已切换到 ${currentPage}.html`);
  });

  // 添加窗口 resize 响应
  window.addEventListener('resize', async () => {
    gpuPath.resize();
    await coldPath.parseHTML(SEL_TM.rawHtmlContent);
    console.log('🔄 响应窗口resize，布局已重新计算');
  });

  // 添加滚动支持
  initScrollSupport(gpuPath);

  console.log('✅ SEL-TM 高阶完整版引擎启动成功｜全特性布局+交互+动画就绪');
}
