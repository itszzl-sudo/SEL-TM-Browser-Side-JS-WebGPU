<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEL-TM 浏览器 WebGPU 标准布局渲染引擎【模块化版】</title>
  <style>
    * { margin: 0; padding: 0; border: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    #sel-tm-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #debug-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 280px;
      padding: 16px;
      background: rgba(15,15,25,0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100,180,255,0.2);
      border-radius: 12px;
      color: #fff;
      font-size: 13px;
      z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #debug-panel h3 {
      margin: 0 0 12px 0;
      color: #4fc3f7;
      font-size: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 8px;
    }
    .debug-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .debug-label { color: #888; }
    .debug-value { color: #4fc3f7; font-weight: 600; }
    select, button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(100,180,255,0.3);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    select:focus, button:focus { outline: none; border-color: #4fc3f7; }
    button:hover { background: rgba(255,255,255,0.15); }
    #hot-status { color: #4caf50; }
  </style>
</head>
<body>
  <canvas id="sel-tm-canvas"></canvas>
  
  <!-- 调试面板 -->
  <div id="debug-panel">
    <h3>SEL-TM Engine</h3>
    <div class="debug-item">
      <span class="debug-label">启动模式:</span>
      <span id="hot-status" class="debug-value">冷启动</span>
    </div>
    <div class="debug-item">
      <span class="debug-label">FPS:</span>
      <span id="fps" class="debug-value">0</span>
    </div>
    <div class="debug-item">
      <span class="debug-label">节点数:</span>
      <span id="node-count" class="debug-value">0</span>
    </div>
    <div class="debug-item">
      <span class="debug-label">渲染模式:</span>
      <span id="render-mode" class="debug-value">WebGPU</span>
    </div>
    <br>
    <select id="page-select">
      <option value="demo.html">demo.html</option>
      <option value="test-all.html">test-all.html</option>
    </select>
    <button id="refresh-btn">刷新布局</button>
  </div>

  <!-- 导入模块 -->
  <script type="module">
    import { SEL_TM } from './src/core/sel-tm.js';
    import { memoryDB } from './src/core/memory-db.js';
    import { HTMLDocumentParser } from './src/core/html-parser.js';
    import { SELColdPath } from './src/core/layout-engine.js';
    import { SELWebGPU } from './src/core/render-engine.js';

    let coldPath;
    let webgpu;
    let currentLayoutTasks = [];

    async function init() {
      // 初始化冷路径
      coldPath = new SELColdPath();
      await coldPath.init(memoryDB, SEL_TM);

      // 初始化 WebGPU
      const canvas = document.getElementById('sel-tm-canvas');
      webgpu = new SELWebGPU(canvas);
      const webgpuReady = await webgpu.init();
      
      if (!webgpuReady) {
        console.error('WebGPU 初始化失败');
        return;
      }

      // 加载默认页面
      await loadPage('demo.html');

      // 设置窗口 resize 监听
      window.addEventListener('resize', handleResize);

      // 设置调试面板事件监听
      window.document.getElementById('page-select').addEventListener('change', (e) => {
        loadPage(e.target.value);
      });
      window.document.getElementById('refresh-btn').addEventListener('click', refreshLayout);

      console.log('✅ SEL-TM 高阶完整版引擎启动成功｜全特性布局+交互+动画就绪');
    }

    async function loadPage(url) {
      try {
        const response = await fetch(url);
        const htmlText = await response.text();

        // 解析 HTML
        const parser = new HTMLDocumentParser();
        const parsedDoc = parser.parse(htmlText);
        
        // 执行布局计算
        const tasks = await coldPath.executeLayout(
          parsedDoc.html.body,
          window.innerWidth,
          window.innerHeight
        );

        currentLayoutTasks = tasks;
        
        // 更新节点计数
        window.document.getElementById('node-count').textContent = tasks.length;

        // 渲染
        webgpu.render(tasks);

        console.log(`📄 页面 ${url} 加载完成，${tasks.length} 个布局节点`);
      } catch (error) {
        console.error('加载页面失败:', error);
      }
    }

    function handleResize() {
      if (currentLayoutTasks.length > 0) {
        webgpu.render(currentLayoutTasks);
        console.log('🔄 响应窗口resize，布局已重新计算');
      }
    }

    function refreshLayout() {
      const select = window.document.getElementById('page-select');
      loadPage(select.value);
    }

    // 启动引擎
    init();
  </script>
</body>
</html>
